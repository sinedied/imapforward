name: Release

on: workflow_dispatch

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm run build
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: sinedied-bot
          GIT_AUTHOR_EMAIL: sinedied-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: sinedied-bot
          GIT_COMMITTER_EMAIL: sinedied-bot@users.noreply.github.com
