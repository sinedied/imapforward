name: build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go build -o imapforward ./src/
      - run: go vet ./src/
      - run: go test -count=1 ./src/
