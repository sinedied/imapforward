name: docker
on:
  schedule:
    - cron: '0 0 1 * *' # First day of every month
  workflow_run:
    workflows: [release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (defaults to latest)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest release tag
        id: tag
        run: echo "version=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value={{date 'YYYYMMDD'}}
            type=raw,value=latest
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag != 'latest' }}

      - name: Resolve version
        id: version
        run: |
          version="${{ steps.tag.outputs.version }}"
          echo "value=${version:-0.0.0-dev}" >> "$GITHUB_OUTPUT"

      - name: Resolve artifact tag
        id: artifact_tag
        run: |
          tag="${{ inputs.tag }}"
          if [ -z "$tag" ] || [ "$tag" = "latest" ]; then
            tag="$(date +%Y%m%d)"
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build local image for Synology artifact
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.artifact_tag.outputs.value }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image archive
        run: docker save -o imapforward-${{ steps.artifact_tag.outputs.value }}.tar $IMAGE_NAME:${{ steps.artifact_tag.outputs.value }}

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: imapforward-docker-image-${{ steps.artifact_tag.outputs.value }}
          path: imapforward-${{ steps.artifact_tag.outputs.value }}.tar
          if-no-files-found: error
